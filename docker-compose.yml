name: dodgyrabbit
services:
  pockettts-cpp:
    build:
      context: .
      dockerfile: Dockerfile
    image: pockettts-cpp:${POCKETTTS_TAG:-local}
    ports:
      - "${POCKETTTS_BIND:-127.0.0.1}:${POCKETTTS_PORT:-8711}:8000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    volumes:
      - pockettts_cpp_voices:/app/voices
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  pockettts_cpp_voices:
