name: openclaw
services:
  pockettts-cpp:
    build:
      context: .
      dockerfile: Dockerfile
    image: pockettts-cpp:${POCKETTTS_TAG:-local}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    volumes:
      - pockettts_cpp_voices:/app/voices
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      openclaw_net:

networks:
  openclaw_net:
    external: true
    name: ${OPENCLAW_NETWORK:-openclaw_default}

volumes:
  pockettts_cpp_voices:
